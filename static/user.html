<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Enregistrements utilisateurs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    main {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 1.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin: 2rem auto;
      max-width: 1200px;
    }
    
    .table-container {
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
    }
    
    .table {
      margin-bottom: 0;
      font-size: 0.95rem;
    }
    
    .table thead {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .table thead th {
      border: none;
      padding: 1.25rem 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.85rem;
      vertical-align: middle;
    }
    
    .table thead th i {
      margin-right: 0.5rem;
      opacity: 0.9;
    }
    
    .table tbody tr {
      border-bottom: 1px solid #e9ecef;
      transition: all 0.3s ease;
    }
    
    .table tbody tr:hover {
      background-color: rgba(102, 126, 234, 0.05);
      box-shadow: inset 0 0 20px rgba(102, 126, 234, 0.1);
      transform: scale(1.01);
    }
    
    .table tbody td {
      padding: 1rem;
      vertical-align: middle;
      border: none;
    }
    
    .table tbody tr:last-child {
      border-bottom: none;
    }
    
    .id-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      font-weight: 600;
      display: inline-block;
      min-width: 45px;
      text-align: center;
    }
    
    .user-name {
      font-weight: 600;
      color: #2d3748;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .user-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 0.8rem;
    }
    
    .email-cell {
      color: #667eea;
      text-decoration: none;
    }
    
    .email-cell:hover {
      text-decoration: underline;
    }
    
    .bio-cell {
      color: #6c757d;
      font-style: italic;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .ville-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .ville-cell i {
      color: #667eea;
    }
    
    .date-cell {
      color: #95a5a6;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .date-cell i {
      color: #667eea;
    }
    
    .stats-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      display: inline-block;
      margin-top: 1rem;
      font-weight: 600;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #95a5a6;
    }
    
    .empty-state i {
      font-size: 4rem;
      color: #ddd;
      margin-bottom: 1rem;
    }
    
    .empty-state h4 {
      color: #2d3748;
      margin-bottom: 1rem;
    }
    
    .spinner-border {
      color: #667eea;
    }
    
    .btn-delete {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 0.4rem 0.75rem;
      border-radius: 0.4rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .btn-delete:hover {
      background: #ff5252;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
    }
    
    .btn-delete:active {
      transform: scale(0.98);
    }
    
    .action-cell {
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
      <div>
        <h1><i class="bi bi-table"></i> Table des utilisateurs</h1>
        <p class="text-muted">Affichage de la table users de la base SQLite.</p>
      </div>
      <div>
        <a href="/static/form.html" class="btn btn-primary me-2">
          <i class="bi bi-plus-circle"></i> Ajouter
        </a>
        <a href="/" class="btn btn-outline-secondary">
          <i class="bi bi-house"></i> Accueil
        </a>
      </div>
    </div>

    <div id="content">
      <div class="text-center">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="mt-2 text-muted">Chargement des données...</p>
      </div>
    </div>
  </main>

  <script>
    async function deleteUser(userId) {
      if (!confirm('Êtes-vous sûr de vouloir supprimer cet utilisateur ?')) {
        return;
      }

      try {
        const response = await fetch(`/delete-user/${userId}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        const data = await response.json();

        if (data.success) {
          alert('Utilisateur supprimé avec succès !');
          loadUsers();
        } else {
          alert('Erreur : ' + data.error);
        }
      } catch (error) {
        console.error('Erreur:', error);
        alert('Une erreur s\'est produite lors de la suppression.');
      }
    }

    async function loadUsers() {
      try {
        const response = await fetch('/users-data');
        const users = await response.json();
        const content = document.getElementById('content');

        if (!users.length) {
          content.innerHTML = `
            <div class="empty-state">
              <i class="bi bi-inbox"></i>
              <h4>Aucun utilisateur enregistré</h4>
              <p class="text-muted mb-3">La table users est actuellement vide.</p>
              <a href="/static/form.html" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Ajouter le premier utilisateur
              </a>
            </div>
          `;
          return;
        }

        const rows = users.map(u => {
          const initials = (u.name.charAt(0) + (u.prenom ? u.prenom.charAt(0) : u.name.charAt(1))).toUpperCase();
          const dateCreated = new Date(u.created_at).toLocaleDateString('fr-FR');
          
          return `
            <tr>
              <td><span class="id-badge">#${u.id}</span></td>
              <td>
                <div class="user-name">
                  <div class="user-avatar">${initials}</div>
                  <span>${u.name}</span>
                </div>
              </td>
              <td><strong>${u.prenom || '—'}</strong></td>
              <td><a href="mailto:${u.email}" class="email-cell"><i class="bi bi-envelope"></i> ${u.email}</a></td>
              <td><span class="bio-cell" title="${u.bio || '—'}">${u.bio || '—'}</span></td>
              <td>
                <div class="ville-cell">
                  <i class="bi bi-geo-alt"></i>
                  <span>${u.ville || '—'}</span>
                </div>
              </td>
              <td>
                <div class="date-cell">
                  <i class="bi bi-calendar2-event"></i>
                  <span>${dateCreated}</span>
                </div>
              </td>
              <td class="action-cell">
                <button class="btn-delete" onclick="deleteUser(${u.id})">
                  <i class="bi bi-trash"></i> Supprimer
                </button>
              </td>
            </tr>
          `;
        }).join('');

        content.innerHTML = `
          <div class="table-container">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th><i class="bi bi-hash"></i>ID</th>
                  <th><i class="bi bi-person"></i>Nom</th>
                  <th><i class="bi bi-person-badge"></i>Prénom</th>
                  <th><i class="bi bi-envelope"></i>Email</th>
                  <th><i class="bi bi-chat-left-quote"></i>Bio</th>
                  <th><i class="bi bi-geo-alt"></i>Ville</th>
                  <th><i class="bi bi-calendar"></i>Date de création</th>
                  <th><i class="bi bi-gear"></i>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>
          <div class="text-center">
            <span class="stats-badge">
              <i class="bi bi-people-fill"></i> Total: ${users.length} utilisateur(s)
            </span>
          </div>
        `;
      } catch (error) {
        console.error('Erreur:', error);
        document.getElementById('content').innerHTML = `
          <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i> Une erreur s'est produite lors du chargement des données.
          </div>
        `;
      }
    }

    window.addEventListener('DOMContentLoaded', loadUsers);
  </script>
</body>
</html>
  </script>
</body>
</html>
