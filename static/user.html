<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Enregistrements utilisateurs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1>Enregistrements utilisateurs</h1>
        <p class="text-muted">Cette page affiche les données enregistrées en SQLite.</p>
      </div>
      <div>
        <a href="/static/form.html" class="btn btn-primary me-2">Aller au formulaire</a>
        <a href="/" class="btn btn-secondary">Accueil</a>
      </div>
    </div>

    <div id="content">
      <p class="text-muted">Chargement des enregistrements...</p>
    </div>
  </main>

  <script>
    async function loadUsers() {
      const response = await fetch('/users-data');
      const users = await response.json();
      const content = document.getElementById('content');

      if (!users.length) {
        content.innerHTML = '<div class="alert alert-info">Aucun enregistrement trouvé.</div>';
        return;
      }

      const rows = users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.name}</td>
          <td>${u.prenom || '—'}</td>
          <td>${u.email}</td>
          <td>${u.bio || '—'}</td>
          <td>${u.ville || '—'}</td>
          <td>${u.created_at}</td>
        </tr>
      `).join('');

      content.innerHTML = `
        <div class="table-responsive">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Email</th>
                <th>Bio</th>
                <th>Ville</th>
                <th>Créé le</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    window.addEventListener('DOMContentLoaded', loadUsers);
  </script>
</body>
</html>
